<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- SEO -->
    <title>جورو | Joro — تسوّق عالمياً، ادفع محلياً</title>
    <meta name="description" content="جورو - منصة التجارة الإلكترونية السعودية. منتجات عالمية من أمازون، نون، علي إكسبرس بأسعار محلية وطرق دفع سعودية." />
    <meta name="keywords" content="جورو, joro, تسوق, Saudi ecommerce, مدى, STC Pay, تابي, تمارا" />

    <!-- Open Graph -->
    <meta property="og:title" content="جورو | Joro" />
    <meta property="og:description" content="تسوّق عالمياً، ادفع محلياً" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://joro.store" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="جورو" />

    <!-- Fonts preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0a0f; }
      #root { min-height: 100vh; }
      /* Loading splash */
      #splash {
        position: fixed; inset: 0; background: #0a0a0f;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 1rem; z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash .logo {
        font-family: sans-serif; font-size: 3rem; font-weight: 900;
        background: linear-gradient(135deg,#7c3aed,#a855f7,#c084fc);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      #splash .bar {
        width: 160px; height: 4px; background: #1e1e2e; border-radius: 2px; overflow: hidden;
      }
      #splash .bar-inner {
        height: 100%; width: 0%; background: linear-gradient(90deg,#7c3aed,#a855f7);
        border-radius: 2px; animation: load 1.2s ease forwards;
      }
      @keyframes load { to { width: 100%; } }
    </style>
  </head>
  <body>
    <!-- Splash screen -->
    <div id="splash">
      <div class="logo">جورو</div>
      <div class="bar"><div class="bar-inner"></div></div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Remove splash after app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 400);
          }
        }, 1400);
      });
    </script>
  </body>
</html>
