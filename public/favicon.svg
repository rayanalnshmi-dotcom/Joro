<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <!-- Main purple gradient for J -->
    <linearGradient id="jGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>

    <!-- Circle ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0.3"/>
    </linearGradient>

    <!-- Shine gradient on J cap -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e9d5ff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0.3"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for ring -->
    <filter id="ringGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7c3aed" flood-opacity="0.5"/>
    </filter>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="40%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>

    <!-- Circuit line gradient -->
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#0a0a0f"/>

  <!-- ── OUTER RING (broken circle) ── -->
  <!-- Main arc top-left to bottom-right -->
  <path d="M 250 60 A 190 190 0 1 1 118 368"
    fill="none" stroke="url(#ringGrad)" stroke-width="6"
    stroke-linecap="round" filter="url(#ringGlow)"/>

  <!-- Small gap arc bottom -->
  <path d="M 118 368 A 190 190 0 0 1 250 60"
    fill="none" stroke="url(#ringGrad)" stroke-width="6"
    stroke-linecap="round" stroke-dasharray="30 999"
    filter="url(#ringGlow)" opacity="0.3"/>

  <!-- Inner thin ring -->
  <circle cx="250" cy="230" r="155"
    fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.25"/>

  <!-- ── CIRCUIT LINES (left side of J) ── -->
  <!-- Line 1 -->
  <line x1="148" y1="210" x2="192" y2="210"
    stroke="url(#circuitGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="148" cy="210" r="4" fill="#a855f7"/>
  <circle cx="144" cy="210" r="2" fill="#c084fc" opacity="0.6"/>

  <!-- Line 2 -->
  <line x1="148" y1="230" x2="185" y2="230"
    stroke="url(#circuitGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="148" cy="230" r="4" fill="#7c3aed"/>
  <circle cx="144" cy="230" r="2" fill="#a855f7" opacity="0.6"/>

  <!-- Line 3 -->
  <line x1="148" y1="250" x2="178" y2="250"
    stroke="url(#circuitGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="148" cy="250" r="4" fill="#6d28d9"/>
  <circle cx="144" cy="250" r="2" fill="#7c3aed" opacity="0.6"/>

  <!-- Branch on line 1 -->
  <line x1="162" y1="210" x2="162" y2="198"
    stroke="#a855f7" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <circle cx="162" cy="196" r="2.5" fill="#c084fc" opacity="0.8"/>

  <!-- Branch on line 2 -->
  <line x1="170" y1="230" x2="170" y2="242"
    stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <circle cx="170" cy="244" r="2.5" fill="#a855f7" opacity="0.8"/>

  <!-- ── BIG J LETTER ── -->
  <!-- J stem (vertical) -->
  <path d="M 270 130 L 270 290 C 270 330 248 355 220 348"
    fill="none" stroke="url(#jGrad)" stroke-width="42"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- J stem inner highlight -->
  <path d="M 270 130 L 270 290 C 270 330 248 355 220 348"
    fill="none" stroke="url(#shineGrad)" stroke-width="14"
    stroke-linecap="round" opacity="0.35"/>

  <!-- J cap (top horizontal bar) -->
  <rect x="220" y="112" width="90" height="42" rx="21"
    fill="url(#shineGrad)" filter="url(#shadow)"/>

  <!-- Cap shine overlay -->
  <rect x="224" y="115" width="82" height="20" rx="10"
    fill="white" opacity="0.12"/>

  <!-- Cap bottom edge -->
  <rect x="222" y="144" width="86" height="8" rx="4"
    fill="#4f46e6" opacity="0.5"/>

  <!-- ── GLOW DOT at top of J ── -->
  <circle cx="270" cy="133" r="10" fill="#c084fc" opacity="0.4" filter="url(#glow)"/>
  <circle cx="270" cy="133" r="5" fill="#e9d5ff" opacity="0.8"/>

  <!-- ── JORO TEXT ── -->
  <text x="250" y="428"
    font-family="'DM Sans', 'Outfit', Arial, sans-serif"
    font-size="72" font-weight="900"
    letter-spacing="-1"
    text-anchor="middle"
    fill="url(#textGrad)">Joro</text>

  <!-- ── TAGLINE ── -->
  <!-- Left dash -->
  <line x1="90" y1="455" x2="148" y2="455"
    stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right dash -->
  <line x1="352" y1="455" x2="410" y2="455"
    stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round"/>

  <text x="250" y="460"
    font-family="'Noto Kufi Arabic', 'Cairo', Arial, sans-serif"
    font-size="22" font-weight="500"
    letter-spacing="1"
    text-anchor="middle"
    fill="#a78bfa"
    opacity="0.85">إلكترونيات لكل احتياجاتك</text>

  <!-- ── SPARKLE DOTS ── -->
  <circle cx="420" cy="140" r="3" fill="#c084fc" opacity="0.7"/>
  <circle cx="430" cy="128" r="1.8" fill="#a855f7" opacity="0.5"/>
  <circle cx="412" cy="125" r="1.2" fill="#7c3aed" opacity="0.4"/>

  <circle cx="78" cy="310" r="2.5" fill="#c084fc" opacity="0.6"/>
  <circle cx="68" cy="322" r="1.5" fill="#a855f7" opacity="0.4"/>
</svg>

